<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babu Rao Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <img src="baburao.jpg" alt="Babu Rao" class="avatar">
            <div class="header-info">
                <h2>Babu Bhaiya</h2>
                <p id="status">Checking connection...</p>
            </div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                Hello! babu bhaia speaking from hera pheri 📞
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Message type kar baba..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
